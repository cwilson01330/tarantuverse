name: Keep Render API Warm

# Render free tier spins services down after ~15 min of inactivity.
# A cold start takes 20-30 seconds during which every user request hangs
# or times out. This workflow pings /health every 10 min to keep the
# container running, so real users never see a cold start.
#
# Note: Tarantuverse and Herpetoverse (web + mobile) share one API —
# tarantuverse-api.onrender.com — so we only need to warm a single host.
#
# GitHub-hosted runners are free and this job takes ~5 seconds. If the
# ping fails we don't block anything — we just log and try again next cycle.

on:
  schedule:
    # Every 10 minutes. GitHub may run slightly off the requested cadence
    # under heavy load, but in practice it fires within 1-2 minutes of the
    # target which is well inside Render's 15-min idle window.
    - cron: "*/10 * * * *"
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Tarantuverse API
        run: |
          URL="https://tarantuverse-api.onrender.com/health"
          echo "Pinging $URL"
          # -f fails on 4xx/5xx, --max-time caps the wait at 60s (covers
          # a full cold start), -s silences progress, -S shows errors.
          # We retry 3 times with a 15s gap so a single transient 502
          # doesn't mark the job as failed and spam our notifications.
          curl -fsS --max-time 60 --retry 3 --retry-delay 15 "$URL" \
            || echo "::warning::Tarantuverse API did not respond — container may be cold-starting"
